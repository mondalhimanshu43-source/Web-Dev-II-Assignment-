<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Async Weather Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>Async Weather Tracker</header>

  <div class="main-wrapper">

    <div class="top-row">

      <div class="left-panel">

        <div class="card">
          <h3>Search City</h3>
          <div class="search-row">
            <input type="text" id="cityInput" placeholder="Delhi, London..." />
            <button id="searchBtn" onclick="handleSearch()">Search</button>
          </div>
        </div>

        <div class="card">
          <h3>Search History</h3>
          <div id="historyContainer"></div>
        </div>

      </div>


      <div class="right-panel">
        <div class="card weather-card">
          <h3>Weather Info</h3>
          <div id="weatherOutput">
            <span class="placeholder-msg">Enter a city name to get weather.</span>
          </div>
        </div>
      </div>

    </div>

   
    <div class="card console-card">
      <h3>Console – Event Loop</h3>
      <div id="consoleOutput"></div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
